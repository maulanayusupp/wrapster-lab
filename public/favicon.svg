<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f5cff"/>
      <stop offset="1" stop-color="#1e2597"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#tile)"/>
  <g transform="skewX(-6)" fill="none" stroke-width="7" stroke-linejoin="round" stroke-linecap="round">
    <!-- left half of the W in the brand's orange accent -->
    <polyline points="15,20 23,45 30,30" stroke="#ff6a2b"/>
    <!-- right half in white -->
    <polyline points="30,30 37,45 45,20" stroke="#ffffff"/>
  </g>
</svg>
